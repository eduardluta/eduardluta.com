[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# Friendly alias for the newsletter serverless function.
[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200
  force = true

# Preserve SEO from the previous (multi-page) site structure.
[[redirects]]
  from = "/blog.html"
  to = "/writing/"
  status = 301
[[redirects]]
  from = "/blog/*"
  to = "/writing/"
  status = 301
[[redirects]]
  from = "/principles.html"
  to = "/principles/"
  status = 301
[[redirects]]
  from = "/worth-the-time.html"
  to = "/writing/"
  status = 301

# Security headers for every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'"

# Long-cache immutable, fingerprinted build assets.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
